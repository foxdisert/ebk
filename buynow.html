<style>

  .msr-card-permonth {

  .msr-card-strike {

  .msr-card-strike s { color: #888; }
  .msr-card.featured .msr-card-strike { color: rgba(0,0,0,0.6); }
  .msr-card.featured .msr-card-strike s { color: rgba(0,0,0,0.5); }
  .msr-card-features {
    list-style: none !important;
    padding: 18px 0 0 !important;
    margin: 0 0 22px !important;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .msr-card.featured .msr-card-features { border-top-color: rgba(0,0,0,0.15); }
  .msr-card-features li {

    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%239EF01A'><path d='M6.5 11L3 7.5 4.4 6.1 6.5 8.2 11.6 3 13 4.4z'/></svg>");
    background-repeat: no-repeat;

  }
  .msr-card-features li.exclusive {
    color: #fff;

  }
  .msr-card-features li.exclusive::before {
    background-color: rgba(158,240,26,0.25);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%239EF01A'><path d='M8 1l2 4.5 5 .5-3.7 3.4 1 5-4.3-2.4-4.3 2.4 1-5L1 6l5-.5z'/></svg>");
  }
  .msr-card.featured .msr-card-features li { color: rgba(0,0,0,0.85) !important; }
  .msr-card.featured .msr-card-features li.exclusive { color: #0a0a0a !important; }
  .msr-card.featured .msr-card-features li::before {
    background-color: rgba(0,0,0,0.12);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%230a0a0a'><path d='M6.5 11L3 7.5 4.4 6.1 6.5 8.2 11.6 3 13 4.4z'/></svg>");
  }
  .msr-card.featured .msr-card-features li.exclusive::before {
    background-color: rgba(0,0,0,0.2);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%230a0a0a'><path d='M8 1l2 4.5 5 .5-3.7 3.4 1 5-4.3-2.4-4.3 2.4 1-5L1 6l5-.5z'/></svg>");
  }
  .msr-card-cta {
    display: block !important;
    width: 100% !important;
    background: #1a1a1a !important;
    color: #fff !important;
    border: 1px solid rgba(255,255,255,0.15) !important;
    padding: 13px !important;
    border-radius: 8px !important;
    font-size: 14px !important;
    font-weight: 600 !important;
    text-align: center !important;
    text-decoration: none !important;
    cursor: pointer;
    transition: all 0.15s;
  }
  .msr-card-cta:hover {
    background: #9EF01A !important;
    color: #0a0a0a !important;
    border-color: #9EF01A !important;
  }
  .msr-card.featured .msr-card-cta {
    background: #0a0a0a !important;
    color: #9EF01A !important;
    border-color: #0a0a0a !important;
  }
  .msr-card.featured .msr-card-cta:hover {
    background: #fff !important;
    color: #0a0a0a !important;
    border-color: #fff !important;
  }
  .msr-card-ready {
    text-align: center;
    font-size: 11px;
    color: #666;
    margin-top: 10px;
  }
  .msr-card.featured .msr-card-ready { color: rgba(0,0,0,0.6); }
  .msr-trial-line { text-align: center; margin-top: 32px; font-size: 14px; color: #aaa; }
  .msr-trial-line a { color: #9EF01A !important; font-weight: 600; text-decoration: none !important; }
  .msr-trial-line a:hover { text-decoration: underline !important; }

  @media (max-width: 1100px) {
    .msr-cards { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 16px !important; }

    .msr-card.featured:hover { transform: translateY(-3px) !important; }
  }
  @media (max-width: 600px) {
    .msr-pricing-wrap { padding: 40px 0 !important; }
    .msr-pricing-inner { padding: 0 16px !important; }

    .msr-toggle-btn { padding: 10px 22px !important; font-size: 13px !important; }

</style>

<section class="msr-pricing-wrap" id="pricing">
  <div class="msr-pricing-inner">
    <div class="msr-pricing-header">
      <div class="msr-pricing-badge">Choose your plan</div>
      <h2 class="msr-pricing-title">Simple <span>pricing</span>, no hidden fees</h2>
      <p class="msr-pricing-sub">All plans include thousands of channels and movies. Premium adds 4K, more devices, and exclusive content.</p>
    </div>

    <div class="msr-toggle-wrap">
      <div class="msr-toggle">
        <button class="msr-toggle-btn active" data-plan="premium" type="button">Premium 8K</button>
        <button class="msr-toggle-btn" data-plan="basic" type="button">Basic HD</button>
      </div>
    </div>

    <div class="msr-cards" id="msr-cards"></div>

    <p class="msr-trial-line">Not sure yet? <a href="https://morsar.link/24h-premium-subscription/">Try 24 hours trial</a>.</p>
  </div>
</section>

<script>
(function() {
  
  var premiumFeatures = [
    { text: 'HD, FHD, 4K & 8K quality', exclusive: true },
    { text: '+39,000 channels with EPG', exclusive: true },
    { text: '+270,000 movies & series', exclusive: true },
    { text: 'PPV events & VIP channels', exclusive: true },
    { text: 'Add extra connections at checkout', exclusive: false },
    { text: 'Antifreeze technology', exclusive: false },
    { text: '99.9% server uptime', exclusive: false },
    { text: '10-day money back', exclusive: false },
    { text: '24/7 priority support', exclusive: false }
  ];
  var basicFeatures = [
    { text: 'SD, HD & FHD quality', exclusive: false },
    { text: '+21,000 channels with EPG', exclusive: false },
    { text: '+100,000 movies & series', exclusive: false },
    { text: 'Standard channels only', exclusive: false },
    { text: 'Add extra connections at checkout', exclusive: false },
    { text: 'Antifreeze technology', exclusive: false },
    { text: '99.9% server uptime', exclusive: false },
    { text: '10-day money back', exclusive: false },
    { text: '24/7 support', exclusive: false }
  ];

  var plans = {
        premium: [
      { duration: '1 Month', months: 1, price: 19.99, popular: false, features: premiumFeatures, link: 'https://morsar.pocketsflow.com/premium-1-volume' },
      { duration: '3 Months', months: 3, price: 45.99, popular: false, features: premiumFeatures, link: 'https://morsar.link/3-months-premium-subscription/' },
      { duration: '12 Months', months: 12, price: 99.99, popular: true, features: premiumFeatures, link: 'https://morsar.link/12-months-premium-subscription/' },
      { duration: '6 Months', months: 6, price: 75.99, popular: false, features: premiumFeatures, link: 'https://morsar.link/6-months-premium-subscription/' }
    ],
    basic: [
      { duration: '1 Month', months: 1, price: 12.99, popular: false, features: basicFeatures, link: 'https://morsar.link/1-month-basic-subscription/' },
      { duration: '3 Months', months: 3, price: 19.99, popular: false, features: basicFeatures, link: 'https://morsar.link/3-months-basic-subscription/' },
      { duration: '12 Months', months: 12, price: 49.99, popular: true, features: basicFeatures, link: 'https://morsar.link/12-months-basic-subscription/' },
      { duration: '6 Months', months: 6, price: 29.99, popular: false, features: basicFeatures, link: 'https://morsar.link/6-months-basic-subscription/' }
    ]
  };

  function render(planKey) {
    var data = plans[planKey];
    var monthly1 = data[0].price;
    var html = data.map(function(p) {
      var perMonth = (p.price / p.months).toFixed(2);
      var fullPriceAtMonthly = monthly1 * p.months;
      var savingsPct = p.months > 1 ? Math.round((1 - p.price / fullPriceAtMonthly) * 100) : 0;
      var popularBadge = p.popular ? '<div class="msr-card-popular">Most Popular</div>' : '';
      var savingsBadge = p.popular && savingsPct > 0
        ? '<div class="msr-card-savings-wrap"><span class="msr-card-savings">Save ' + savingsPct + '%</span></div>'
        : '';
      var priceParts = p.price.toFixed(2).split('.');
      var perMonthLine = p.months > 1
        ? '<div class="msr-card-permonth">$' + perMonth + '/month</div>'
        : '<div class="msr-card-permonth">&nbsp;</div>';
      var strikeHtml = p.months > 1
        ? '<div class="msr-card-strike"><span><s>$' + fullPriceAtMonthly.toFixed(2) + '</s> billed every ' + p.months + ' months</span></div>'
        : '<div class="msr-card-strike"><span>Billed monthly</span></div>';
      var extraAttrs = p.attrs ? ' ' + p.attrs : '';
      // Route every Buy Now click through the ebook site so the checkout sees
      // ebookmorsar.online as the traffic source (referrer + utm_source).
      var checkoutUrl = 'https://ebookmorsar.online/go.html?to=' + encodeURIComponent(p.link);
      var features = p.features.map(function(f) {
        return '<li' + (f.exclusive ? ' class="exclusive"' : '') + '>' + f.text + '</li>';
      }).join('');
      return '<div class="msr-card' + (p.popular ? ' featured' : '') + '">' +
        popularBadge +
        savingsBadge +
        '<div class="msr-card-duration">' + p.duration + '</div>' +
        '<div class="msr-card-price"><span class="currency">$</span><span class="amount">' + priceParts[0] + '</span><span class="cents">.' + priceParts[1] + '</span></div>' +
        perMonthLine +
        strikeHtml +
        '<ul class="msr-card-features">' + features + '</ul>' +
        '<a href="' + checkoutUrl + '" class="msr-card-cta"' + extraAttrs + '>Buy Now</a>' +
        '<div class="msr-card-ready">Ready within 5-7 mins</div>' +
      '</div>';
    }).join('');
    document.getElementById('msr-cards').innerHTML = html;
  }

  document.querySelectorAll('.msr-toggle-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.msr-toggle-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      render(this.dataset.plan);
    });
  });

  render('premium');
})();
</script>
